name: CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ref
        uses: actions/checkout@v2

      - name: Check formatting
        uses: denoland/setup-deno@v1
        with:
          deno-version: "1.28.3"
        run: "deno fmt --check"

      - name: Run tests
        uses: denoland/setup-deno@v1
        with:
          deno-version: "1.28.3"
        run: "deno test -A"
